name: Release

on:
  push:
    tags: ["v*"]

  # Allow manual trigger for testing
  workflow_dispatch:

env:
  RUST_REPO: https://github.com/protegrity/sql-glot-rust.git
  RUST_TAG: v0.10.0

jobs:
  # ── Job 1: Cross-compile the Rust shared library for each platform ───
  build-native:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux-gnu
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            lib_ext: so

          - platform: aarch64-linux-gnu
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            lib_ext: so
            use_cross: true

          - platform: x86_64-darwin
            os: macos-13
            rust_target: x86_64-apple-darwin
            lib_ext: dylib

          - platform: arm64-darwin
            os: macos-latest
            rust_target: aarch64-apple-darwin
            lib_ext: dylib

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Clone sql-glot-rust
        run: git clone --depth 1 --branch ${{ env.RUST_TAG }} ${{ env.RUST_REPO }} ext/sqlglot_rust/sql-glot-rust

      - name: Build shared library
        run: |
          MANIFEST=ext/sqlglot_rust/sql-glot-rust/Cargo.toml
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.rust_target }} --manifest-path "$MANIFEST"
          else
            cargo build --release --target ${{ matrix.rust_target }} --manifest-path "$MANIFEST"
          fi

      - name: Upload compiled library
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          path: ext/sqlglot_rust/sql-glot-rust/target/${{ matrix.rust_target }}/release/libsqlglot_rust.${{ matrix.lib_ext }}
          if-no-files-found: error

  # ── Job 2: Package platform-specific gems ────────────────────────────
  package-native:
    name: Package (${{ matrix.platform }})
    needs: build-native
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64-linux-gnu
            lib_ext: so
          - platform: aarch64-linux-gnu
            lib_ext: so
          - platform: x86_64-darwin
            lib_ext: dylib
          - platform: arm64-darwin
            lib_ext: dylib

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Download compiled library
        uses: actions/download-artifact@v8
        with:
          name: native-${{ matrix.platform }}
          path: lib/sqlglot/

      - name: Verify library exists
        run: ls -lh lib/sqlglot/libsqlglot_rust.${{ matrix.lib_ext }}

      - name: Build platform gem
        run: ruby scripts/build_native_gem.rb ${{ matrix.platform }}

      - name: Upload gem
        uses: actions/upload-artifact@v7
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem
          if-no-files-found: error

  # ── Job 3: Build the source gem (fallback for unsupported platforms) ─
  package-source:
    name: Package (source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build source gem
        run: gem build sqlglot.gemspec

      - name: Upload gem
        uses: actions/upload-artifact@v7
        with:
          name: gem-source
          path: "*.gem"
          if-no-files-found: error

  # ── Job 4: Collect all gems into a single artifact ───────────────────
  collect:
    name: Collect gems
    needs: [package-native, package-source]
    runs-on: ubuntu-latest
    steps:
      - name: Download all gem artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gem-*
          path: release-gems/
          merge-multiple: true

      - name: List gems
        run: ls -lh release-gems/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-gems
          path: release-gems/*.gem
          if-no-files-found: error

  # ── Job 5: Publish all gems to RubyGems.org ──────────────────────────
  publish:
    name: Publish to RubyGems.org
    needs: [package-native, package-source]
    runs-on: ubuntu-latest
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Download all gem artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gem-*
          path: gems/
          merge-multiple: true

      - name: Configure gem credentials
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<EOF
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 0600 ~/.gem/credentials

      - name: Push gems
        run: |
          for gem in gems/*.gem; do
            echo "Publishing $gem ..."
            gem push "$gem"
          done
